name: Rho Bounce Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run bot
      env:
        IQ_EMAIL: ${{ secrets.IQ_EMAIL }}
        IQ_PASSWORD: ${{ secrets.IQ_PASSWORD }}
      run: |
        cd experiments
        MAX_CYCLES=3 python3 -u rho_real_gh.py
      timeout-minutes: 3

    - name: Save results
      if: always()
      run: |
        git config user.email "bot@github.com"
        git config user.name "Bot"
        git add experiments/results/ || true
        git diff --staged --quiet || git commit -m "trades $(date -u '+%Y-%m-%d %H:%M')"
        git push || true
